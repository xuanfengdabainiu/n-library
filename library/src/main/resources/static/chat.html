<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>POP! 图书交流群</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        :root {
            --pop-yellow: #FFDE00; --pop-pink: #FF3366; --pop-blue: #00E5FF;
            --pop-green: #00FF66; --pop-black: #111111; --pop-white: #ffffff;
        }
        body {
            font-family: 'Impact', '黑体', sans-serif; background-color: #f0f0f0;
            background-image: radial-gradient(var(--pop-blue) 10%, transparent 11%);
            background-size: 20px 20px; margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; height: 100vh; box-sizing: border-box;
        }

        /* 聊天室主容器 */
        .chat-container {
            width: 100%; max-width: 800px; height: 90vh;
            background: var(--pop-white); border: 8px solid var(--pop-black);
            box-shadow: 15px 15px 0px var(--pop-black);
            display: flex; flex-direction: column; position: relative;
        }

        /* 头部栏 */
        .chat-header {
            background: var(--pop-yellow); border-bottom: 8px solid var(--pop-black);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .chat-header h2 { margin: 0; font-size: 2rem; -webkit-text-stroke: 1px var(--pop-black); color: var(--pop-white); text-shadow: 3px 3px 0 var(--pop-black); transform: rotate(-2deg); }

        /* ✨ 新增：顶部信息区布局 */
        .header-info { display: flex; gap: 10px; align-items: center; }
        .badge { background: var(--pop-pink); color: white; padding: 5px 10px; border: 3px solid var(--pop-black); font-size: 1.2rem; transform: rotate(3deg); box-shadow: 3px 3px 0 var(--pop-black);}
        .coin-badge { background: var(--pop-blue); color: var(--pop-black); font-weight: bold; transform: rotate(-2deg); }

        .back-btn { background: var(--pop-black); color: var(--pop-white); border: none; padding: 10px 15px; font-size: 1rem; cursor: pointer; font-family: 'Impact'; transition: 0.2s;}
        .back-btn:hover { background: var(--pop-green); color: var(--pop-black); transform: scale(1.1); }

        /* 聊天消息区 */
        .chat-box {
            flex: 1; padding: 20px; overflow-y: auto; background: var(--pop-white);
            background-image: radial-gradient(#ddd 10%, transparent 11%); background-size: 15px 15px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* 消息气泡公用样式 */
        .message-wrapper { display: flex; flex-direction: column; max-width: 70%; animation: popIn 0.3s ease-out forwards; }
        .message-sender { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; color: var(--pop-black); }
        .message-bubble {
            padding: 12px 18px; border: 4px solid var(--pop-black); font-size: 1.2rem;
            font-family: sans-serif; font-weight: bold; line-height: 1.4; position: relative;
        }

        .msg-others { align-self: flex-start; }
        .msg-others .message-bubble { background: var(--pop-green); border-radius: 0 20px 20px 20px; box-shadow: 6px 6px 0px var(--pop-black); }

        .msg-self { align-self: flex-end; align-items: flex-end; }
        .msg-self .message-bubble { background: var(--pop-white); border-radius: 20px 0 20px 20px; box-shadow: -6px 6px 0px var(--pop-black); }

        /* 底部输入区 */
        .chat-input-area {
            background: var(--pop-pink); border-top: 8px solid var(--pop-black);
            padding: 15px; display: flex; gap: 10px; align-items: stretch;
        }
        .chat-input-area input {
            flex: 1; border: 5px solid var(--pop-black); padding: 15px; font-size: 1.2rem;
            font-family: '黑体', sans-serif; font-weight: bold; outline: none; transition: 0.2s;
        }
        .chat-input-area input:focus { background: var(--pop-yellow); }
        .send-btn {
            background: var(--pop-white); color: var(--pop-black); border: 5px solid var(--pop-black);
            padding: 0 25px; font-size: 1.5rem; cursor: pointer; font-family: 'Impact';
            box-shadow: 6px 6px 0px var(--pop-black); transition: 0.1s;
        }
        .send-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--pop-black); background: var(--pop-yellow); }

        /* ✨ 动画：出场动画 */
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* ✨ 动画：没钱时的输入框疯狂震动特效 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-15px) rotate(-3deg); }
            40% { transform: translateX(15px) rotate(3deg); }
            60% { transform: translateX(-15px) rotate(-3deg); }
            80% { transform: translateX(15px) rotate(3deg); }
        }
        .error-shake { animation: shake 0.4s ease-in-out; background: #ff9999 !important; border-color: var(--pop-yellow) !important; }

        /* 系统提示消息 */
        .system-msg { align-self: center; background: var(--pop-black); color: var(--pop-yellow); padding: 5px 15px; font-size: 0.8rem; border-radius: 20px; }

        /* =========================================
           ✨ 破产弹窗 (Broke Popup)
           ========================================= */
        .broke-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 17, 17, 0.8); z-index: 9999;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .broke-content {
            background: var(--pop-yellow); border: 8px solid var(--pop-black);
            box-shadow: 20px 20px 0px var(--pop-pink); padding: 30px; width: 350px;
            text-align: center;
        }
        .broke-content h2 { font-size: 3rem; color: var(--pop-white); -webkit-text-stroke: 2px var(--pop-black); text-shadow: 4px 4px 0 var(--pop-black); margin-top:0; transform: rotate(-4deg); }
        .broke-content p { font-size: 1.2rem; font-family: '黑体'; font-weight: bold; margin-bottom: 25px;}
        .broke-actions { display: flex; flex-direction: column; gap: 10px; }
        .broke-btn {
            background: var(--pop-green); color: var(--pop-black); border: 4px solid var(--pop-black);
            padding: 15px; font-size: 1.2rem; font-family: 'Impact'; cursor: pointer;
            box-shadow: 6px 6px 0px var(--pop-black); transition: 0.2s; text-transform: uppercase;
        }
        .broke-btn:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px var(--pop-black); }
        .broke-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--pop-black); }
        .broke-cancel { background: var(--pop-white); color: var(--pop-black); box-shadow: 4px 4px 0px var(--pop-black); }
    </style>
</head>
<body>

<div class="broke-overlay" id="brokeOverlay">
    <div class="broke-content" id="brokeContent">
        <h2>💥 BROKE! 💥</h2>
        <p>Oops! 你的波普币不足 10 个啦！<br>没钱可发不出电波哦 📡</p>
        <div class="broke-actions">
            <button class="broke-btn" onclick="window.location.href='user-index.html'"><i class="fa-solid fa-book-open"></i> 去读书赚硬币</button>
            <button class="broke-btn broke-cancel" onclick="closeBrokePopup()">我再看看</button>
        </div>
    </div>
</div>

<div class="chat-container">
    <div class="chat-header">
        <button class="back-btn" onclick="window.location.href='user-index.html'"><i class="fa-solid fa-arrow-left"></i> LEAVE</button>
        <h2>POP! CHAT</h2>
        <div class="header-info">
            <div class="badge coin-badge" id="coinDisplay">🪙 拉取中...</div>
            <div class="badge">发言 -10 🪙</div>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="system-msg">🔌 正在连接波普电波...</div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="在此输入消息... (10🪙/条)" onkeypress="handleEnter(event)">
        <button class="send-btn" onclick="sendMessage()">POW! 发送</button>
    </div>
</div>

<script>
    // ==========================================
    // 🛡️ 安保大闸：用户登录校验
    // ==========================================
    const currentUsername = localStorage.getItem('username');
    if (!currentUsername) {
        alert("⚠️ 没买票可不能进聊天室哦！");
        window.location.href = "login.html";
        throw new Error("Access Denied");
    }

    let stompClient = null;
    let currentCoins = 0; // ✨ 本地维护的硬币状态
    const chatBox = document.getElementById('chatBox');
    const coinDisplay = document.getElementById('coinDisplay');

    // 1. 初始化：加载余额 -> 拉历史 -> 连 WebSocket
    window.onload = function() {
        fetchUserCoins();
        loadHistory();
        connectWebSocket();
    };

    // ✨ 2. 调用咱们之前的 /api/user/stats 接口获取余额
    async function fetchUserCoins() {
        try {
            const res = await fetch(`/api/user/stats?username=${currentUsername}`);
            if (res.ok) {
                const data = await res.json();
                currentCoins = data.popCoins || 0;
                coinDisplay.innerText = `🪙 ${currentCoins}`;
            } else {
                coinDisplay.innerText = `🪙 Error`;
            }
        } catch (e) {
            console.error("加载硬币失败", e);
        }
    }

    // 3. 拉取历史记录
    async function loadHistory() {
        try {
            const res = await fetch('/api/chat/history');
            if (res.ok) {
                const historyData = await res.json();
                chatBox.innerHTML = '<div class="system-msg">📜 以上是历史消息记录</div>';
                historyData.forEach(msg => {
                    renderMessage(msg.sender, msg.content);
                });
                scrollToBottom();
            }
        } catch (e) {
            console.error("加载历史记录失败", e);
        }
    }

    // 4. 连接 WebSocket
    function connectWebSocket() {
        let socket = new SockJS('/pop-chat');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function (frame) {
            const msgNode = document.createElement('div');
            msgNode.className = "system-msg";
            msgNode.innerText = "🟢 连接成功！你现在可以开始聊天了！";
            chatBox.appendChild(msgNode);
            scrollToBottom();

            stompClient.subscribe('/topic/public', function (messageOutput) {
                let msgData = JSON.parse(messageOutput.body);
                renderMessage(msgData.sender, msgData.content);
            });
        }, function(error) {
            const errNode = document.createElement('div');
            errNode.className = "system-msg";
            errNode.style.background = "red";
            errNode.innerText = "🔴 频道连接断开，请刷新重试。";
            chatBox.appendChild(errNode);
        });
    }

    // ✨ 5. 发送消息 (核心：前端余额拦截与动效)
    function sendMessage() {
        let inputField = document.getElementById('chatInput');
        let content = inputField.value.trim();

        if (content === '') return;

        // 💰 【大闸拦截】：如果钱不够，直接弹窗并震动输入框！
        if (currentCoins < 10) {
            // 震动特效
            inputField.classList.add('error-shake');
            setTimeout(() => { inputField.classList.remove('error-shake'); }, 400);

            // 弹出破产警告
            document.getElementById('brokeOverlay').style.display = 'flex';
            return;
        }

        // 💰 如果钱够了，发送数据给后端
        if (stompClient && stompClient.connected) {
            stompClient.send("/app/send", {}, JSON.stringify({
                'sender': currentUsername,
                'content': content
            }));

            // ✨ 【乐观更新】：立刻在本地扣除 10 金币并更新 UI，让用户有即时扣费的爽快感
            currentCoins -= 10;
            coinDisplay.innerText = `🪙 ${currentCoins}`;

            inputField.value = ''; // 清空输入框
        } else {
            alert("📡 正在尝试重连波普电波，请稍后再试！");
        }
    }

    // 回车发送
    function handleEnter(event) {
        if (event.key === "Enter") sendMessage();
    }

    // 6. 渲染消息
    function renderMessage(sender, content) {
        const isSelf = (sender === currentUsername);
        const wrapperDiv = document.createElement('div');

        wrapperDiv.className = isSelf ? 'message-wrapper msg-self' : 'message-wrapper msg-others';

        wrapperDiv.innerHTML = `
            <div class="message-sender">${isSelf ? 'ME' : sender}</div>
            <div class="message-bubble">${content}</div>
        `;

        chatBox.appendChild(wrapperDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // ✨ 关闭弹窗函数
    function closeBrokePopup() {
        document.getElementById('brokeOverlay').style.display = 'none';
    }
</script>

</body>
</html>
