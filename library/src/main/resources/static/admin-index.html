<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>POP! ADMIN DASHBOARD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pop-yellow: #FFDE00; --pop-pink: #FF3366; --pop-blue: #00E5FF;
            --pop-green: #00FF66; --pop-black: #111111; --pop-white: #ffffff;
            --bg-dots: radial-gradient(rgba(17, 17, 17, 0.15) 20%, transparent 21%);
        }

        body {
            font-family: 'Impact', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; background-color: var(--pop-white); background-image: var(--bg-dots); background-size: 30px 30px;
        }

        /* =========================================
           ✨ 1. 传统布局但波普风格的外壳
           ========================================= */
        /* 左侧侧边栏 */
        .sidebar {
            width: 280px; background: var(--pop-black); color: var(--pop-white);
            border-right: 8px solid var(--pop-black); display: flex; flex-direction: column;
            box-shadow: 10px 0 0 var(--pop-pink); z-index: 100;
        }

        .logo-area {
            padding: 30px 20px; text-align: center; border-bottom: 6px solid var(--pop-white);
            background: var(--pop-yellow); color: var(--pop-black);
        }
        .logo-area h1 { margin: 0; font-size: 3rem; -webkit-text-stroke: 1.5px var(--pop-black); transform: rotate(-5deg); }

        .nav-menu { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .nav-btn {
            background: var(--pop-white); color: var(--pop-black); border: 5px solid var(--pop-black);
            padding: 15px; font-size: 1.5rem; cursor: pointer; text-transform: uppercase; font-family: 'Impact';
            transition: all 0.2s; position: relative; display: flex; align-items: center; gap: 10px;
            box-shadow: 6px 6px 0 var(--pop-pink);
        }
        .nav-btn:hover, .nav-btn.active { transform: translate(-4px, -4px); box-shadow: 10px 10px 0 var(--pop-blue); background: var(--pop-yellow); }
        .nav-btn:active { transform: translate(4px, 4px); box-shadow: 0 0 0 transparent; }

        /* 右侧主区域 */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; perspective: 2000px; }

        /* 顶部信息栏 */
        .topbar {
            height: 80px; background: var(--pop-blue); border-bottom: 8px solid var(--pop-black);
            display: flex; justify-content: space-between; align-items: center; padding: 0 40px;
            box-shadow: 0 10px 0 var(--pop-black); z-index: 50;
        }
        .admin-info { font-size: 1.5rem; text-transform: uppercase; -webkit-text-stroke: 1px var(--pop-white); letter-spacing: 2px; }
        .logout-btn { background: var(--pop-pink); color: var(--pop-white); border: 4px solid var(--pop-black); padding: 8px 20px; font-size: 1.2rem; cursor: pointer; font-family: 'Impact'; box-shadow: 4px 4px 0 var(--pop-black); transition: 0.1s; }
        .logout-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--pop-black); }

        /* 视图容器 */
        .view-container { flex-grow: 1; padding: 40px; position: relative; overflow-y: auto; overflow-x: hidden; }

        /* =========================================
           ✨ 2. 各个模块的波普 UI 样式
           ========================================= */
        .section-panel { display: none; width: 100%; height: 100%; background: var(--pop-white); border: 8px solid var(--pop-black); box-shadow: 20px 20px 0 var(--pop-black); padding: 30px; box-sizing: border-box; position: absolute; top: 40px; left: 40px; width: calc(100% - 80px); height: calc(100% - 80px); transform-origin: center center; }
        .section-header { font-size: 3.5rem; border-bottom: 8px solid var(--pop-black); padding-bottom: 10px; margin-bottom: 30px; text-transform: uppercase; -webkit-text-stroke: 1.5px var(--pop-black); color: var(--pop-yellow); text-shadow: 5px 5px 0 var(--pop-black); }

        /* 表格波普化 */
        .pop-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pop-table th { background: var(--pop-green); border: 5px solid var(--pop-black); padding: 15px; font-size: 1.5rem; -webkit-text-stroke: 1px var(--pop-black); color: white; text-align: left; }
        .pop-table td { border: 5px solid var(--pop-black); padding: 15px; font-size: 1.2rem; font-family: 'Courier New', Courier, monospace; font-weight: bold; background: var(--pop-white); }
        .pop-table tr:hover td { background: var(--pop-yellow); }

        .btn-small { background: var(--pop-blue); color: var(--pop-white); border: 3px solid var(--pop-black); padding: 5px 15px; font-family: 'Impact'; font-size: 1.2rem; cursor: pointer; box-shadow: 3px 3px 0 var(--pop-black); transition: 0.1s; }
        .btn-small:active { transform: translate(2px,2px); box-shadow: 0 0 0 black; }
        .btn-danger { background: var(--pop-pink); }

        /* 排行榜领奖台样式 */
        .podium { display: flex; align-items: flex-end; justify-content: center; gap: 20px; height: 300px; margin-top: 50px; }
        .step { border: 8px solid var(--pop-black); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 20px; font-size: 3rem; -webkit-text-stroke: 1.5px var(--pop-black); box-shadow: 10px 10px 0 var(--pop-black); position: relative; }
        .step-2 { width: 150px; height: 200px; background: var(--pop-blue); color: white; }
        .step-1 { width: 180px; height: 280px; background: var(--pop-yellow); color: var(--pop-pink); }
        .step-3 { width: 150px; height: 140px; background: var(--pop-green); color: white; }
        .book-title { position: absolute; top: -60px; font-size: 1.2rem; text-align: center; background: var(--pop-white); border: 4px solid var(--pop-black); padding: 5px 10px; box-shadow: 4px 4px 0 var(--pop-black); -webkit-text-stroke: 0; color: black; }

        /* =========================================
           ✨ 3. 四大极致入场动画
           ========================================= */

        /* 动画 1：💥 用户管理 (爆炸现身) */
        .anim-explosion { display: block; animation: popExplosionIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popExplosionIn {
            0% { transform: scale(0); opacity: 0; filter: drop-shadow(0 0 0 transparent); }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(40px 40px 0 var(--pop-pink)); border-width: 20px; }
            100% { transform: scale(1); opacity: 1; filter: drop-shadow(20px 20px 0 var(--pop-black)); border-width: 8px; }
        }
        /* 漫画爆炸背景层 */
        .explosion-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 150%; height: 150%; background: var(--pop-yellow); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); z-index: -1; opacity: 0; pointer-events: none; border: 20px solid var(--pop-black); }
        .anim-explosion ~ .explosion-bg { animation: blastBg 0.6s ease-out; }
        @keyframes blastBg { 0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; } 50% { transform: translate(-50%, -50%) scale(1.5) rotate(15deg); opacity: 1; background: var(--pop-pink); } 100% { transform: translate(-50%, -50%) scale(2) rotate(30deg); opacity: 0; } }

        /* 动画 2：📖 书籍管理 (艺术翻页) */
        .anim-pageflip { display: block; transform-origin: left center; animation: comicPageTurn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes comicPageTurn {
            0% { transform: rotateY(-90deg) scale(0.8); opacity: 0; box-shadow: -50px 0 20px rgba(0,0,0,0.5); }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; box-shadow: 20px 20px 0 var(--pop-black); }
        }

        /* 动画 3：🛡️ 工作人员 (分镜滑入) */
        .anim-panel-slide { display: block; animation: panelSlideIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes panelSlideIn {
            0% { transform: translateX(120%) skewX(-30deg); opacity: 0; border-left-width: 40px; border-color: var(--pop-blue); }
            70% { transform: translateX(-5%) skewX(10deg); opacity: 1; border-color: var(--pop-black); }
            100% { transform: translateX(0) skewX(0deg); opacity: 1; border-width: 8px; }
        }

        /* 动画 4：🔥 排行榜 (重力砸落 + 屏幕震动) */
        .anim-heavydrop { display: block; animation: heavyDrop 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes heavyDrop {
            0% { transform: translateY(-120vh) rotate(-10deg); opacity: 1; }
            70% { transform: translateY(5%) rotate(2deg); box-shadow: 0 0 0 var(--pop-black); }
            80% { transform: translateY(-2%) rotate(0deg); box-shadow: 10px 10px 0 var(--pop-black); }
            100% { transform: translateY(0) rotate(0deg); box-shadow: 20px 20px 0 var(--pop-black); }
        }
        .shake-screen { animation: screenShake 0.4s 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes screenShake { 0%, 100% { transform: translate3d(0, 0, 0); } 20%, 60% { transform: translate3d(-10px, 10px, 0); } 40%, 80% { transform: translate3d(10px, -10px, 0); } }

        /* =========================================
           ✨ 新增：删除专用的满屏 BOOM 爆炸特效
           ========================================= */
        .delete-boom-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 17, 17, 0.85); z-index: 9999;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .delete-boom-layer.active { display: flex; }
        .boom-text-box {
            font-size: 10rem; color: var(--pop-yellow);
            -webkit-text-stroke: 6px var(--pop-black);
            text-shadow: 20px 20px 0 var(--pop-pink), -10px -10px 0 var(--pop-blue);
            transform: scale(0);
        }
        .delete-boom-layer.active .boom-text-box {
            animation: ultimateBoom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes ultimateBoom {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            40% { transform: scale(1.5) rotate(15deg); opacity: 1; }
            60% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="delete-boom-layer" id="deleteBoomLayer">
    <div class="boom-text-box">BOOM!</div>
</div>
<aside class="sidebar">
    <div class="logo-area">
        <h1>POP!<br>ADMIN</h1>
    </div>
    <nav class="nav-menu">
        <button class="nav-btn active" onclick="switchTab('sec-users', 'anim-explosion', this)">
            <i class="fa-solid fa-users"></i> USERS
        </button>
        <button class="nav-btn" onclick="switchTab('sec-books', 'anim-pageflip', this)">
            <i class="fa-solid fa-book-journal-whills"></i> BOOKS DB
        </button>
        <button class="nav-btn" onclick="switchTab('sec-staff', 'anim-panel-slide', this)">
            <i class="fa-solid fa-user-shield"></i> STAFF
        </button>
        <button class="nav-btn" onclick="switchTab('sec-ranking', 'anim-heavydrop', this)">
            <i class="fa-solid fa-fire"></i> TRENDING
        </button>
    </nav>
</aside>

<main class="main-content">
    <header class="topbar">
        <div class="admin-info">
            <i class="fa-solid fa-user-astronaut"></i> <span id="currentAdminName">SUPER_ADMIN</span>
        </div>
        <button class="logout-btn" onclick="logoutAdmin()">EXIT SYSTEM</button>
    </header>

    <div class="view-container" id="viewContainer">
        <div class="explosion-bg"></div>
        <section id="sec-users" class="section-panel anim-explosion" style="background: var(--pop-yellow);">
            <h2 class="section-header" style="color: var(--pop-pink); text-shadow: 4px 4px 0 var(--pop-black);">USER MANAGEMENT</h2>

            <div style="min-height: 380px;">
                <table class="pop-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>USERNAME</th>
                        <th>POP COINS</th>
                        <th>ACTION</th>
                    </tr>
                    </thead>
                    <tbody id="userTableBody">
                    <tr><td colspan="4" style="text-align: center;">LOADING USERS...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="userPagination" style="display: none; justify-content: center; align-items: center; gap: 20px; margin-top: 20px;">
                <button class="btn-small" id="btnPrevUser" style="background: var(--pop-blue); color: var(--pop-white);" onclick="changeUserPage(-1)">◀ PREV</button>
                <span id="userPageInfo" style="font-size: 1.8rem; color: var(--pop-black); -webkit-text-stroke: 1px var(--pop-white); font-weight: bold; text-shadow: 3px 3px 0 var(--pop-white);">PAGE 1 / 1</span>
                <button class="btn-small" id="btnNextUser" style="background: var(--pop-blue); color: var(--pop-white);" onclick="changeUserPage(1)">NEXT ▶</button>
            </div>
        </section>

        <section id="sec-books" class="section-panel" style="background: var(--pop-blue);">
            <h2 class="section-header" style="color: var(--pop-white);">GLOBAL BOOK DB</h2>

            <div style="min-height: 380px;">
                <table class="pop-table">
                    <thead><tr><th>ID</th><th>ISBN</th><th>TITLE</th><th>AUTHOR</th><th>ACTION</th></tr></thead>
                    <tbody id="bookTableBody">
                    <tr><td colspan="5" style="text-align: center;">LOADING BOOKS...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="bookPagination" style="display: none; justify-content: center; align-items: center; gap: 20px; margin-top: 20px;">
                <button class="btn-small" id="btnPrevBook" style="background: var(--pop-yellow); color: var(--pop-black);" onclick="changeBookPage(-1)">◀ PREV</button>
                <span id="bookPageInfo" style="font-size: 1.8rem; color: var(--pop-white); -webkit-text-stroke: 1.5px var(--pop-black); font-weight: bold; text-shadow: 3px 3px 0 var(--pop-black);">PAGE 1 / 1</span>
                <button class="btn-small" id="btnNextBook" style="background: var(--pop-yellow); color: var(--pop-black);" onclick="changeBookPage(1)">NEXT ▶</button>
            </div>
        </section>

            <section id="sec-staff" class="section-panel" style="background: var(--pop-green);">
            <h2 class="section-header" style="color: var(--pop-pink); text-shadow: 4px 4px 0 var(--pop-black);">STAFF ACCESS</h2>

            <button class="nav-btn" style="margin-bottom: 20px; display: inline-block;" onclick="hireStaff()">+ HIRE NEW STAFF</button>

            <div style="min-height: 330px;">
                <table class="pop-table">
                    <thead><tr><th>STAFF ID</th><th>USERNAME</th><th>ROLE</th><th>ACTION</th></tr></thead>
                    <tbody id="staffTableBody">
                    <tr><td colspan="4" style="text-align: center;">LOADING STAFF...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="staffPagination" style="display: none; justify-content: center; align-items: center; gap: 20px; margin-top: 20px;">
                <button class="btn-small" id="btnPrevStaff" style="background: var(--pop-pink); color: var(--pop-white);" onclick="changeStaffPage(-1)">◀ PREV</button>
                <span id="staffPageInfo" style="font-size: 1.8rem; color: var(--pop-black); -webkit-text-stroke: 1px var(--pop-white); font-weight: bold; text-shadow: 3px 3px 0 var(--pop-white);">PAGE 1 / 1</span>
                <button class="btn-small" id="btnNextStaff" style="background: var(--pop-pink); color: var(--pop-white);" onclick="changeStaffPage(1)">NEXT ▶</button>
            </div>
        </section>

        <section id="sec-ranking" class="section-panel" style="background: var(--pop-pink);">
            <h2 class="section-header" style="color: var(--pop-yellow);">TRENDING TOP 3</h2>

            <div class="podium">
                <div class="step step-2">
                    <div class="book-title" id="rank2-title">???</div>
                    <div style="font-size: 1.5rem; margin-bottom: 5px; color: var(--pop-yellow);">🔥 <span id="rank2-hot">0</span></div>
                    #2
                </div>

                <div class="step step-1">
                    <div class="book-title" id="rank1-title" style="top: -75px; font-size: 1.5rem; background: var(--pop-yellow);">???</div>
                    <i class="fa-solid fa-crown" style="font-size: 2.5rem; margin-bottom: 10px; color: white;"></i>
                    <div style="font-size: 1.8rem; margin-bottom: 5px; color: white;">🔥 <span id="rank1-hot">0</span></div>
                    #1
                </div>

                <div class="step step-3">
                    <div class="book-title" id="rank3-title">???</div>
                    <div style="font-size: 1.5rem; margin-bottom: 5px; color: var(--pop-yellow);">🔥 <span id="rank3-hot">0</span></div>
                    #3
                </div>
            </div>
        </section>
    </div>
</main>

<script>
    // 初始化读取管理员名字
    // ==========================================
    // 🛡️ 顶级安保：管理员权限校验
    // ==========================================
    const adminName = localStorage.getItem('admin_username');
    if (!adminName) {
        alert("🛑 INTRUDER DETECTED! 未经授权，禁止访问！");
        window.location.href = "login.html";
        throw new Error("Access Denied"); // 💥 直接切断执行，页面冻结！
    }
    document.getElementById('currentAdminName').innerText = adminName;
    // 退出登录
    function logoutAdmin() {
        localStorage.removeItem('admin_username');
        window.location.href = 'login.html';
    }

    // ==========================================
    // 核心切换逻辑
    // ==========================================
    function switchTab(targetId, animClass, btnElement) {
        // 1. 按钮高亮切换
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        // 2. 隐藏所有模块，移除所有动画类
        const sections = document.querySelectorAll('.section-panel');
        sections.forEach(sec => {
            sec.style.display = 'none';
            sec.classList.remove('anim-explosion', 'anim-pageflip', 'anim-panel-slide', 'anim-heavydrop');
        });

        // 3. 移除页面的震动类
        const mainContainer = document.getElementById('viewContainer');
        mainContainer.classList.remove('shake-screen');

        // 4. ✨ 核心数据拉取触发点
        if (targetId === 'sec-users') {
            loadUsers();
        } else if (targetId === 'sec-books') {
            loadBooks();
        } else if (targetId === 'sec-staff') {
            loadStaff();
        } else if (targetId === 'sec-ranking') {
            loadTrending(); // ✨ 点击排行模块，拉取王牌数据！
        }

        // 5. 触发目标模块的专属动画
        const targetSection = document.getElementById(targetId);
        void targetSection.offsetWidth; // 强制重绘
        targetSection.style.display = 'block';
        targetSection.classList.add(animClass);

        // 专属震动适配
        if(animClass === 'anim-heavydrop') {
            void mainContainer.offsetWidth;
            mainContainer.classList.add('shake-screen');
        }

    }
    // ==========================================
    // 模块 1 API：用户管理 (带动态分页)
    // ==========================================
    let allUsersData = [];       // 存取所有用户的仓库
    let currentUserPage = 1;     // 用户当前页码
    const usersPerPage = 5;      // ✨ 每页显示 5 个用户

    function loadUsers() {
        fetch('/api/admin/dashboard/users')
            .then(response => {
                if (!response.ok) throw new Error("404 或其他网络错误");
                return response.json();
            })
            .then(users => {
                allUsersData = users; // 数据存入仓库
                currentUserPage = 1;  // 重置回第一页
                renderUserTable();    // 渲染表格
            })
            .catch(err => {
                console.error("加载失败:", err);
                document.getElementById('userTableBody').innerHTML = '<tr><td colspan="4" style="color:red; text-align:center;">SERVER ERROR: 无法获取数据</td></tr>';
            });
    }

    // ✨ 渲染当前页的用户
    function renderUserTable() {
        const tbody = document.getElementById('userTableBody');
        const pagination = document.getElementById('userPagination');
        tbody.innerHTML = '';

        if (allUsersData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">NO USERS FOUND.</td></tr>';
            pagination.style.display = 'none'; // 没人就藏起分页条
            return;
        }

        // 计算分页切片
        const totalPages = Math.ceil(allUsersData.length / usersPerPage);
        const startIndex = (currentUserPage - 1) * usersPerPage;
        const endIndex = startIndex + usersPerPage;
        const currentUsers = allUsersData.slice(startIndex, endIndex);

        // 渲染当前页的数据
        currentUsers.forEach(user => {
            const coins = user.popCoins ? user.popCoins : 0;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                    <td>#${user.id}</td>
                    <td>${user.username}</td>
                    <td>${coins} 🪙</td>
                    <td>
                        <button class="btn-small btn-danger" onclick="deleteUser(${user.id}, '${user.username}')">
                            DELETE
                        </button>
                    </td>
                `;
            tbody.appendChild(tr);
        });

        // ✨ 更新分页条的状态
        pagination.style.display = 'flex';
        document.getElementById('userPageInfo').innerText = `PAGE ${currentUserPage} / ${totalPages}`;

        const btnPrev = document.getElementById('btnPrevUser');
        const btnNext = document.getElementById('btnNextUser');

        // 按钮可用状态控制
        btnPrev.disabled = currentUserPage === 1;
        btnPrev.style.opacity = currentUserPage === 1 ? '0.4' : '1';
        btnPrev.style.cursor = currentUserPage === 1 ? 'not-allowed' : 'pointer';

        btnNext.disabled = currentUserPage === totalPages;
        btnNext.style.opacity = currentUserPage === totalPages ? '0.4' : '1';
        btnNext.style.cursor = currentUserPage === totalPages ? 'not-allowed' : 'pointer';
    }

    // ✨ 翻页按钮触发的函数
    function changeUserPage(direction) {
        const totalPages = Math.ceil(allUsersData.length / usersPerPage);
        const newPage = currentUserPage + direction;
        if (newPage >= 1 && newPage <= totalPages) {
            currentUserPage = newPage;
            renderUserTable(); // 重新渲染表格
        }
    }

    // 物理删除请求 (自带爆炸特效)
    function deleteUser(userId, username) {
        if(confirm(`⚠️ DANGER ⚠️\n确定要彻底删除用户 [ ${username} ] 吗？\n这是物理删除，数据将无法恢复！`)) {
            fetch(`/api/admin/dashboard/users/${userId}/delete`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        const boomLayer = document.getElementById('deleteBoomLayer');
                        if(boomLayer) boomLayer.classList.add('active');

                        setTimeout(() => {
                            if(boomLayer) boomLayer.classList.remove('active');
                            alert(`💥 目标已清除: ${data.message}`);
                            loadUsers(); // 刷新数据，会自动切片重绘
                        }, 600);
                    } else {
                        alert("ERROR: " + data.message);
                    }
                })
                .catch(err => alert("SERVER ERROR!"));
        }
    }

    // 页面初始化时，默认加载第一个 USERS 模块的数据
    window.onload = () => {
        loadUsers();
    };
    // ==========================================
    // 模块 2 API：书籍管理 (带动态分页)
    // ==========================================
    let allBooksData = [];       // 存取所有书籍的仓库
    let currentBookPage = 1;     // 当前页码
    const booksPerPage = 5;      // ✨ 每页显示 5 本书 (你可以随便改)

    function loadBooks() {
        fetch('/api/admin/dashboard/books')
            .then(res => res.json())
            .then(books => {
                allBooksData = books; // 把数据存到全局变量
                currentBookPage = 1;  // 数据刷新时，强制回到第一页
                renderBookTable();    // 渲染表格
            })
            .catch(err => console.error(err));
    }

    // ✨ 渲染当前页的书籍
    function renderBookTable() {
        const tbody = document.getElementById('bookTableBody');
        const pagination = document.getElementById('bookPagination');
        tbody.innerHTML = '';

        if (allBooksData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">NO BOOKS FOUND. CLICK [MINT NEW BOOK]</td></tr>';
            pagination.style.display = 'none'; // 没书就藏起分页条
            return;
        }

        // 计算分页数据 (切片)
        const totalPages = Math.ceil(allBooksData.length / booksPerPage);
        const startIndex = (currentBookPage - 1) * booksPerPage;
        const endIndex = startIndex + booksPerPage;
        const currentBooks = allBooksData.slice(startIndex, endIndex);

        // 把当前页的书塞进表格
        currentBooks.forEach(book => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                    <td>B-${book.id}</td>
                    <td>${book.isbn || 'N/A'}</td>
                    <td>${book.title}</td>
                    <td>${book.author}</td>
                    <td>
                        <button class="btn-small btn-danger" onclick="deleteBook(${book.id}, '${book.title}')">
                            DELETE
                        </button>
                    </td>
                `;
            tbody.appendChild(tr);
        });

        // ✨ 更新分页条的状态
        pagination.style.display = 'flex';
        document.getElementById('bookPageInfo').innerText = `PAGE ${currentBookPage} / ${totalPages}`;

        const btnPrev = document.getElementById('btnPrevBook');
        const btnNext = document.getElementById('btnNextBook');

        // 如果是第一页，变灰且禁用 PREV
        btnPrev.disabled = currentBookPage === 1;
        btnPrev.style.opacity = currentBookPage === 1 ? '0.4' : '1';
        btnPrev.style.cursor = currentBookPage === 1 ? 'not-allowed' : 'pointer';

        // 如果是最后一页，变灰且禁用 NEXT
        btnNext.disabled = currentBookPage === totalPages;
        btnNext.style.opacity = currentBookPage === totalPages ? '0.4' : '1';
        btnNext.style.cursor = currentBookPage === totalPages ? 'not-allowed' : 'pointer';
    }

    // ✨ 翻页按钮触发的函数
    function changeBookPage(direction) {
        const totalPages = Math.ceil(allBooksData.length / booksPerPage);
        const newPage = currentBookPage + direction;

        // 安全限制，防止翻出界
        if (newPage >= 1 && newPage <= totalPages) {
            currentBookPage = newPage;
            renderBookTable(); // 重新渲染表格
        }
    }


    // 下架删除书籍 (不变)
    function deleteBook(bookId, title) {
        if(confirm(`⚠️ DANGER ⚠️\n确定要下架销毁书籍《${title}》吗？`)) {
            fetch(`/api/admin/dashboard/books/${bookId}/delete`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        const boomLayer = document.getElementById('deleteBoomLayer');
                        if(boomLayer) boomLayer.classList.add('active');
                        setTimeout(() => {
                            if(boomLayer) boomLayer.classList.remove('active');
                            alert(`💥 目标已清除: ${data.message}`);
                            loadBooks(); // 删除后刷新数据
                        }, 600);
                    } else {
                        alert("ERROR: " + data.message);
                    }
                })
                .catch(err => alert("SERVER ERROR!"));
        }
    }
    // ==========================================
    // 模块 3 API：工作人员管理 (带动态分页 & 护身符防自尽)
    // ==========================================
    let allStaffData = [];
    let currentStaffPage = 1;
    const staffPerPage = 5;

    function loadStaff() {
        fetch('/api/admin/dashboard/staff')
            .then(res => res.json())
            .then(staff => {
                allStaffData = staff;
                currentStaffPage = 1;
                renderStaffTable();
            })
            .catch(err => console.error(err));
    }

    function renderStaffTable() {
        const tbody = document.getElementById('staffTableBody');
        const pagination = document.getElementById('staffPagination');
        tbody.innerHTML = '';

        if (allStaffData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">NO STAFF FOUND.</td></tr>';
            pagination.style.display = 'none';
            return;
        }

        const totalPages = Math.ceil(allStaffData.length / staffPerPage);
        const startIndex = (currentStaffPage - 1) * staffPerPage;
        const endIndex = startIndex + staffPerPage;
        const currentStaff = allStaffData.slice(startIndex, endIndex);

        currentStaff.forEach(staff => {
            const tr = document.createElement('tr');

            // ✨ 护身符逻辑：如果是当前登录的账号，不显示红色的 REVOKE（撤销），显示灰色的 ACTIVE
            let actionButtonHtml = '';
            if (staff.username === adminName) {
                actionButtonHtml = `<button class="btn-small" style="background: gray; cursor: not-allowed;" disabled>ME (ACTIVE)</button>`;
            } else {
                actionButtonHtml = `<button class="btn-small btn-danger" onclick="revokeStaff(${staff.id}, '${staff.username}')">REVOKE</button>`;
            }

            tr.innerHTML = `
                    <td>S-${staff.id}</td>
                    <td>${staff.username}</td>
                    <td>SUPER ADMIN</td>
                    <td>${actionButtonHtml}</td>
                `;
            tbody.appendChild(tr);
        });

        pagination.style.display = 'flex';
        document.getElementById('staffPageInfo').innerText = `PAGE ${currentStaffPage} / ${totalPages}`;

        const btnPrev = document.getElementById('btnPrevStaff');
        const btnNext = document.getElementById('btnNextStaff');

        btnPrev.disabled = currentStaffPage === 1;
        btnPrev.style.opacity = currentStaffPage === 1 ? '0.4' : '1';
        btnPrev.style.cursor = currentStaffPage === 1 ? 'not-allowed' : 'pointer';

        btnNext.disabled = currentStaffPage === totalPages;
        btnNext.style.opacity = currentStaffPage === totalPages ? '0.4' : '1';
        btnNext.style.cursor = currentStaffPage === totalPages ? 'not-allowed' : 'pointer';
    }

    function changeStaffPage(direction) {
        const totalPages = Math.ceil(allStaffData.length / staffPerPage);
        const newPage = currentStaffPage + direction;
        if (newPage >= 1 && newPage <= totalPages) {
            currentStaffPage = newPage;
            renderStaffTable();
        }
    }

    // 添加新管理员
    function hireStaff() {
        const username = prompt("✨ 请输入新员工账号 (USERNAME):", "editor_01");
        if(!username) return;
        const password = prompt("✨ 请设置员工初始密码 (PASSWORD):", "123456");
        if(!password) return;

        fetch('/api/admin/dashboard/staff/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
        })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert("✅ " + data.message);
                    loadStaff();
                } else {
                    alert("ERROR: " + data.message);
                }
            });
    }

    // 开除管理员
    function revokeStaff(staffId, username) {
        if(confirm(`⚠️ DANGER ⚠️\n确定要剥夺员工 [ ${username} ] 的管理权限吗？\n这是物理删除，即刻生效！`)) {
            fetch(`/api/admin/dashboard/staff/${staffId}/delete`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        const boomLayer = document.getElementById('deleteBoomLayer');
                        if(boomLayer) boomLayer.classList.add('active');
                        setTimeout(() => {
                            if(boomLayer) boomLayer.classList.remove('active');
                            alert(`💥 目标已清除: ${data.message}`);
                            loadStaff();
                        }, 600);
                    } else {
                        alert("ERROR: " + data.message);
                    }
                })
                .catch(err => alert("SERVER ERROR!"));
        }
    }

    // ==========================================
    // 模块 4 API：热度排行 (TRENDING TOP 3)
    // ==========================================
    function loadTrending() {
        fetch('/api/admin/dashboard/trending')
            .then(res => res.json())
            .then(data => {
                // 确保有数据才赋值，避免报错
                if(data.length > 0) {
                    document.getElementById('rank1-title').innerText = data[0].title;
                    document.getElementById('rank1-hot').innerText = data[0].hotness;
                }
                if(data.length > 1) {
                    document.getElementById('rank2-title').innerText = data[1].title;
                    document.getElementById('rank2-hot').innerText = data[1].hotness;
                }
                if(data.length > 2) {
                    document.getElementById('rank3-title').innerText = data[2].title;
                    document.getElementById('rank3-hot').innerText = data[2].hotness;
                }
            })
            .catch(err => console.error("排行拉取失败: ", err));
    }
</script>
</body>
</html>
